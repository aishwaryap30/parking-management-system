<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        transition: 0.3s;
        overflow-x: hidden;
    }

    /* THEMES */
    body.dark {
        background: radial-gradient(circle at 20% 20%, #1a1f3c, #0b0f1a);
        color: white;
    }

    body.light {
        background: radial-gradient(circle at 20% 20%, #ffffff, #dbeafe);
        color: #0f172a;
    }

    /* GLOW */
    .bg-glow {
        position: fixed;
        width: 500px;
        height: 500px;
        background: #7c3aed;
        filter: blur(120px);
        opacity: 0.2;
        top: -100px;
        left: -100px;
        z-index: -1;
    }

    /* NAVBAR */
    .navbar {
        height: 90px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 80px;
    }

    .logo span {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .nav-buttons button {
        margin-left: 15px;
        padding: 12px 24px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .dark .nav-buttons button {
        background: rgba(255,255,255,0.08);
        color: white;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .light .nav-buttons button {
        background: #e2e8f0;
        color: #0f172a;
    }

    .nav-buttons button:hover {
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        transform: scale(1.05);
    }

    /* MAIN */
    .container {
        padding: 40px 80px;
    }

    .header {
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }

    /* STATS CARDS */
    .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        margin-bottom: 40px;
    }

    .stat-box {
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        transition: 0.3s;
    }

    .stat-box:hover {
        transform: translateY(-5px) scale(1.03);
    }

    .stat-box h3 {
        font-size: 38px;
        margin-bottom: 10px;
    }

    .stat-box p {
        font-size: 16px;
        color: #94a3b8;
    }

    /* SLOT GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 20px;
    }

    .slot {
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .slot:hover {
        transform: scale(1.05);
    }

    /* SLOT COLORS */
    .free {
        background: linear-gradient(135deg, #22c55e, #4ade80);
        color: white;
    }

    .occupied {
        background: linear-gradient(135deg, #ef4444, #f87171);
        color: white;
    }

    /* LEGEND */
    .legend {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .legend div {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .legend span {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        display: inline-block;
    }

    .green { background: #22c55e; }
    .red { background: #ef4444; }

    /* BACK BUTTON */
    .back {
        text-align: center;
        margin-top: 40px;
    }

    .btn {
        padding: 14px 30px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-primary {
        background: rgba(255,255,255,0.1);
        color: white;
    }

    .btn-primary:hover {
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        transform: scale(1.05);
    }

    /* ============================= */
/* RESPONSIVENESS ONLY */
/* ============================= */

/* TABLET (<= 1024px) */
@media (max-width: 1024px) {

    .navbar {
        padding: 0 40px;
    }

    .container {
        padding: 30px 40px;
    }

    .header {
        font-size: 34px;
    }

    .stats {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* MOBILE (<= 768px) */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        height: auto;
        padding: 15px 20px;
        gap: 15px;
    }

    .nav-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .container {
        padding: 25px 20px;
    }

    .header {
        font-size: 28px;
    }

    .stats {
        grid-template-columns: 1fr;
        gap: 15px;
    }

    .stat-box h3 {
        font-size: 30px;
    }

    .grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 15px;
    }

    .slot {
        padding: 15px;
    }

    .legend {
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .btn {
        width: 100%;
    }
}

/* SMALL MOBILE (<= 480px) */
@media (max-width: 480px) {

    .logo span {
        font-size: 22px;
    }

    .header {
        font-size: 24px;
    }

    .stat-box {
        padding: 20px;
    }

    .stat-box h3 {
        font-size: 26px;
    }

    .grid {
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    }

    .slot {
        font-size: 14px;
    }

    .btn {
        font-size: 14px;
        padding: 12px;
    }
}

  </style>
</head>

<body class="dark">

<div class="bg-glow"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <span>Smart Parking</span>
  </div>

  <div class="nav-buttons">

    <a href="/history"><button>View History</button></a>
    <a href="/"><button>Home</button></a>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="header">🅿️ Parking Dashboard</div>

  <!-- STATS -->
  <div class="stats">

    <div class="stat-box">
      <h3 th:text="${slots.size()}"></h3>
      <p>Total Slots</p>
    </div>

    <div class="stat-box">
      <h3 th:text="${#lists.size(slots.?[status=='FREE'])}"></h3>
      <p>Available</p>
    </div>

    <div class="stat-box">
      <h3 th:text="${#lists.size(slots.?[status=='OCCUPIED'])}"></h3>
      <p>Occupied</p>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid">
    <div th:each="slot : ${slots}"
         class="slot"
         th:classappend="${slot.status=='FREE'}?'free':'occupied'">

      <h4 th:text="${slot.slotNumber}"></h4>

      <!-- FREE SLOT -->
      <div th:if="${slot.status == 'FREE'}">
        <p>🟢 FREE</p>
      </div>

      <!-- OCCUPIED SLOT -->
      <div th:if="${slot.status == 'OCCUPIED'}">

        <p>🔴 OCCUPIED</p>

        <p style="font-size:12px; margin-top:5px;"
           th:if="${slotVehicleMap[slot.id] != null}">

          🚗 <span th:text="${slotVehicleMap[slot.id]}"></span>

        </p>

      </div>

    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div><span class="green"></span> Free</div>
    <div><span class="red"></span> Occupied</div>
  </div>

  <!-- BACK -->
  <div class="back">
    <a href="/"><button class="btn btn-primary">⬅ Back</button></a>
  </div>

</div>

<script>
  function toggleTheme() {
      let body = document.body;

      if (body.classList.contains("dark")) {
          body.classList.remove("dark");
          body.classList.add("light");
          localStorage.setItem("theme", "light");
      } else {
          body.classList.remove("light");
          body.classList.add("dark");
          localStorage.setItem("theme", "dark");
      }
  }

  window.onload = function() {
      let theme = localStorage.getItem("theme") || "dark";
      document.body.classList.add(theme);
  };
</script>

</body>
</html>
