<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Parking History</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }
        /* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    margin-bottom: 20px;
}

.logo {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #7c3aed, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-buttons button {
    margin-left: 15px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

.nav-buttons button:hover {
    transform: scale(1.1);
    background: linear-gradient(90deg, #7c3aed, #22d3ee);
}

/* LIGHT MODE FIX */
body.light .nav-buttons button {
    background: #e2e8f0;
    color: #0f172a;
}

/* ANIMATIONS */
.timeline-item {
    animation: fadeInUp 0.5s ease forwards;
    opacity: 0;
}

.timeline-item:nth-child(1) { animation-delay: 0.1s; }
.timeline-item:nth-child(2) { animation-delay: 0.2s; }
.timeline-item:nth-child(3) { animation-delay: 0.3s; }
.timeline-item:nth-child(4) { animation-delay: 0.4s; }

@keyframes fadeInUp {
    from {
        transform: translateY(20px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* BUTTON HOVER */
.btn:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

body.dark {
    background: #0f172a;
    color: white;
}

body.light {
    background: #f8fafc;
    color: #0f172a;
}

body.light .filter-box,
body.light .box,
body.light .timeline-content {
    background: rgba(0,0,0,0.05);
}

body.light th {
    background: #e2e8f0;
}

        h1 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
        }

        /* FILTER BOX */
        .filter-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-search {
            background: #22c55e;
            color: white;
        }

        .btn-reset {
            background: #ef4444;
            color: white;
        }

        .btn-back {
            background: #7c3aed;
            color: white;
            margin-top: 30px;
        }

        /* TABLE */
        .box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1e293b;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.03);
        }

        .status-active {
            color: #22c55e;
            font-weight: bold;
        }

        .status-closed {
            color: #ef4444;
            font-weight: bold;
        }

        .center {
            text-align: center;
        }

        .timeline {
    position: relative;
    max-width: 800px;
    margin: auto;
}

.timeline-item {
    position: relative;
    margin: 20px 0;
    padding-left: 40px;
}

.timeline-dot {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 15px;
    height: 15px;
    background: #7c3aed;
    border-radius: 50%;
}

.timeline-content {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    text-align: left;
}

        /* TABLET */
@media (max-width: 1024px) {
    .navbar {
        padding: 10px 20px;
    }

    h1 {
        font-size: 30px;
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        gap: 10px;
    }

    .nav-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .filter-box {
        flex-direction: column;
    }

    input, select {
        width: 100%;
    }

    .btn {
        width: 100%;
    }

    .timeline-item {
        padding-left: 30px;
    }

    .timeline-dot {
        left: 5px;
    }
}

/* SMALL MOBILE */
@media (max-width: 480px) {
    h1 {
        font-size: 22px;
    }

    .logo {
        font-size: 18px;
    }
}
    </style>
</head>

<body class="dark">

<div class="navbar">

    <div class="logo">🚗 Smart Parking</div>

    <div class="nav-buttons">
        <a href="/"><button>Home</button></a>

        <button onclick="goBack()">⬅ Back</button>

        <button onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

</div>

<h1>📜 Parking History</h1>

<form method="get" action="/history">

    <div class="filter-box">

        <!-- Vehicle Search -->
        <input type="text" name="vehicleNumber"
               placeholder="Vehicle Number"
               th:value="${vehicleNumber}">

        <!-- Slot -->
        <select name="slotNumber">
            <option value="">All Slots</option>
            <option value="S1" th:selected="${slotNumber=='S1'}">S1</option>
            <option value="S2" th:selected="${slotNumber=='S2'}">S2</option>
            <option value="S3" th:selected="${slotNumber=='S3'}">S3</option>
            <option value="S4" th:selected="${slotNumber=='S4'}">S4</option>
            <option value="S5" th:selected="${slotNumber=='S5'}">S5</option>
            <option value="S6" th:selected="${slotNumber=='S6'}">S6</option>
            <option value="S7" th:selected="${slotNumber=='S7'}">S7</option>
            <option value="S8" th:selected="${slotNumber=='S8'}">S8</option>
        </select>

        <!-- Filter Type -->
        <select name="filterType">
            <option value="ACTIVE" th:selected="${filterType=='ACTIVE'}">Active During</option>
            <option value="ENTRY" th:selected="${filterType=='ENTRY'}">Entry Date</option>
            <option value="EXIT" th:selected="${filterType=='EXIT'}">Exit Date</option>
        </select>

        <!-- Date Range -->
        <input type="date" name="startDate" th:value="${startDate}">
        <input type="date" name="endDate" th:value="${endDate}">

        <!-- Buttons -->
        <button type="submit" class="btn btn-search">🔍 Apply</button>
        <a href="/history">
            <button type="button" class="btn btn-reset">Reset</button>
        </a>

    </div>

</form>

<div class="box">
    <div class="timeline">

        <div th:each="t : ${tickets}" class="timeline-item">

            <div class="timeline-dot"></div>

            <div class="timeline-content">

                <h3 th:text="${t.vehicleNumber}"></h3>

                <p>
                    🟢 Entry:
                    <span th:text="${#temporals.format(t.entryTime, 'dd MMM yyyy HH:mm')}"></span>
                </p>

                <p th:if="${t.exitTime != null}">
                    🔴 Exit:
                    <span th:text="${#temporals.format(t.exitTime, 'dd MMM yyyy HH:mm')}"></span>
                </p>

                <p th:if="${t.exitTime == null}" style="color: lightgreen;">
                    ⏳ Still Parked (ACTIVE)
                </p>

                <p>
                    Slot:
                    <span th:text="${t.slot.slotNumber}"></span>
                </p>

            </div>
        </div>

    </div>
</div>

<div class="center">
    <a href="/dashboard">
        <button class="btn btn-back">⬅ Back to Dashboard</button>
    </a>
</div>


<script>
    function toggleTheme() {
        let body = document.body;

        if (body.classList.contains("dark")) {
            body.classList.remove("dark");
            body.classList.add("light");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light");
            body.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }

        updateIcon();
    }

    function updateIcon() {
        let btn = document.getElementById("themeBtn");
        btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
    }

    function goBack() {
        window.history.back();
    }

    window.onload = function() {
        let theme = localStorage.getItem("theme") || "dark";
        document.body.classList.add(theme);
        updateIcon();
    };
</script>

</body>
</html>
