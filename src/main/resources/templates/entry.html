<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Entry</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        transition: 0.3s;
        overflow-x: hidden;
    }

    /* THEMES */
    body.dark {
        background: radial-gradient(circle at 20% 20%, #1a1f3c, #0b0f1a);
        color: white;
    }

    body.light {
        background: radial-gradient(circle at 20% 20%, #ffffff, #dbeafe);
        color: #0f172a;
    }

    /* GLOW */
    body::before {
        content: "";
        position: fixed;
        width: 500px;
        height: 500px;
        background: #7c3aed;
        filter: blur(120px);
        opacity: 0.2;
        top: -100px;
        left: -100px;
        z-index: -1;
    }

    /* NAVBAR */
    .navbar {
        height: 90px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 80px;
    }

    .logo span {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* NAV BUTTON */
    .nav-buttons button {



        background: rgba(255,255,255,0.08);
        color: white;

          margin-left: 15px;
          padding: 12px 24px;
          border-radius: 10px;
          border: none;
          cursor: pointer;
          font-weight: 600;
          font-size: 18px;
          transition: 0.3s;
    }

    .light .nav-buttons button {
        background: #e2e8f0;
        color: #0f172a;
    }

    .nav-buttons button:hover {
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        transform: scale(1.1);
    }

    /* CENTER */
    .container {
        height: calc(100vh - 90px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-top: -40px;
    }

    /* HEADER */
    .header {
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 25px;
    }

    /* CARD */
    .card {
        width: 420px;
        padding: 40px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        text-align: center;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .light .card {
        background: rgba(255,255,255,0.7);
        color: #0f172a;
    }

    /* INPUT */
    input {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        margin-top: 15px;
        outline: none;
        font-size: 15px;
    }

    .light input {
        background: #f1f5f9;
    }

    /* BUTTONS */
    .btn {
        padding: 14px 25px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        margin-top: 15px;
        transition: 0.3s;
    }

    .btn-success {
        width: 100%;
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        color: white;
    }

    .btn-success:hover {
        transform: scale(1.05);
    }

    .btn-primary {
        background: rgba(255,255,255,0.1);
        color: white;
    }

    .light .btn-primary {
        background: #e2e8f0;
        color: #0f172a;
    }

    .btn-primary:hover {
        background: linear-gradient(90deg, #7c3aed, #22d3ee);
        color: white;
    }

    .btn-danger {
        background: #ef4444;
        color: white;
    }

    /* MODAL */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        justify-content: center;
        align-items: center;
    }

    /* TICKET */
    .ticket-box {
        background: white;
        color: black;
        padding: 25px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        border: 2px dashed #000;
        font-family: monospace;
    }

    /* FIX BUTTON VISIBILITY */
    .ticket-box .btn-primary {
        background: #7c3aed;
        color: white;
    }
    .ticket-box .btn-danger {
        background: #ef4444;
    }

    /* BACK BUTTON */
    .back-btn {
        margin-top: 20px;
    }


    /* ============================= */
/* RESPONSIVENESS ONLY */
/* ============================= */

/* TABLET (<= 1024px) */
@media (max-width: 1024px) {

    .navbar {
        padding: 0 40px;
    }

    .header {
        font-size: 34px;
    }

    .card {
        width: 380px;
        padding: 35px;
    }
}

/* MOBILE (<= 768px) */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        height: auto;
        padding: 15px 20px;
        gap: 15px;
    }

    .nav-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .container {
        height: auto;
        padding: 40px 20px;
        margin-top: 0;
    }

    .header {
        font-size: 28px;
        text-align: center;
    }

    .card {
        width: 100%;
        max-width: 360px;
        padding: 25px;
    }

    input {
        font-size: 14px;
    }

    .btn {
        width: 100%;
    }

    .back-btn {
        width: 100%;
    }

    .ticket-box {
        width: 90%;
    }
}

/* SMALL MOBILE (<= 480px) */
@media (max-width: 480px) {

    .logo span {
        font-size: 22px;
    }

    .header {
        font-size: 24px;
    }

    .card {
        padding: 20px;
    }

    input {
        padding: 12px;
    }

    .btn {
        font-size: 14px;
        padding: 12px;
    }
}
  </style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <span>Smart Parking</span>
  </div>

  <div class="nav-buttons">
    <a href="/"><button>Home</button></a>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="header">Vehicle Entry</div>

  <div class="card">
    <form action="/entry" method="post">
      <input type="text" name="vehicleNumber" placeholder="Vehicle Number" required>
      <button class="btn btn-success">Generate Ticket</button>
    </form>
  </div>

  <a href="/">
    <button class="btn btn-primary back-btn">⬅ Back</button>
  </a>

</div>

<!-- MODAL -->
<div class="modal" id="ticketModal" th:if="${ticket}">
  <div class="ticket-box">

    <h3>🎟 Parking Ticket</h3>

    <p><b>Ticket:</b> <span th:text="${ticket.ticketNumber}"></span></p>
    <p><b>Vehicle:</b> <span th:text="${ticket.vehicleNumber}"></span></p>
    <p><b>Slot:</b> <span th:text="${ticket.slotNumber}"></span></p>
    <p><b>Entry Time:</b> <span th:text="${ticket.entryTime}"></span></p>

    <button onclick="printTicket()" class="btn btn-primary">Print</button>
    <button onclick="closeModal()" class="btn btn-danger">Close</button>

  </div>
</div>

<script>
  window.onload = function() {
      var modal = document.getElementById("ticketModal");
      if(modal) modal.style.display = "flex";

      let theme = localStorage.getItem("theme") || "dark";
      document.body.classList.add(theme);
      updateIcon();
  }

  function toggleTheme() {
      let body = document.body;

      if (body.classList.contains("dark")) {
          body.classList.remove("dark");
          body.classList.add("light");
          localStorage.setItem("theme", "light");
      } else {
          body.classList.remove("light");
          body.classList.add("dark");
          localStorage.setItem("theme", "dark");
      }

      updateIcon();
  }

  function updateIcon() {
      let btn = document.getElementById("themeBtn");
      btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
  }

  function closeModal() {
      document.getElementById("ticketModal").style.display = "none";
  }

  function printTicket() {
      var content = document.querySelector(".ticket-box").innerHTML;
      var win = window.open('', '', 'width=600,height=600');
      win.document.write(content);
      win.print();
  }
</script>

</body>
</html>
